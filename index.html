<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRPG Engine — Phase 15</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
  </style>
</head>
<body>
<script type="module">
import { Renderer, LAYER }      from './engine/renderer.js';
import { Camera }               from './engine/camera.js';
import { Input }                from './engine/input.js';
import { GameLoop }             from './engine/gameloop.js';
import { loadMap, MapRenderer } from './engine/map.js';
import { Character }            from './engine/character.js';
import { Party }                from './engine/party.js';
import { MovementController }   from './engine/movement.js';
import { GameState }            from './engine/gamestate.js';
import { GameTime }             from './engine/time.js';
import { Lighting }             from './engine/lighting.js';
import { Weather, WEATHER_CYCLE } from './engine/weather.js';
import { Events }               from './engine/events.js';
import { NPCs }                 from './engine/npc.js';
import { Dialogue }             from './engine/dialogue.js';
import { Secrets }              from './engine/secrets.js';
import { Factions }             from './engine/factions.js';
import { Journal }              from './ui/journal.js';
import { Items, LootTables }    from './engine/items.js';
import { Inventory }            from './engine/inventory.js';
import { Equipment }            from './engine/equipment.js';
import { InventoryUI }          from './ui/inventory_ui.js';
import { Classes }              from './engine/classes.js';
import { Abilities }            from './engine/abilities.js';
import { Lock }                 from './engine/locks.js';
import { CombatEngine }         from './engine/combat.js';
import { Progression }          from './engine/progression.js';
import { TrainingUI }           from './ui/training_ui.js';
import { Encounters }           from './engine/encounters.js';
import { ArenaGenerator }       from './engine/arena_generator.js';
import { Traps }                from './engine/traps.js';
import { MusicEngine, MOOD_STATES } from './engine/music.js';
import { Save }                     from './engine/save.js';
import { MainMenu }                 from './ui/main_menu.js';

// ─── Engine Setup ─────────────────────────────────────────────────────────────
const renderer = new Renderer();
const camera   = new Camera();
const loop     = new GameLoop(100);
const input    = new Input(renderer.canvas, camera, () => renderer.scale);

// ─── Phase 4: Time, Lighting, Weather ────────────────────────────────────────
const gameTime = new GameTime();
const lighting = new Lighting(renderer, gameTime);
const weather  = new Weather(renderer);

GameState.gameTime = gameTime;

// ─── Game State ───────────────────────────────────────────────────────────────
let mapData      = null;
let mapRenderer  = null;
let party        = null;
let movement     = null;
let debugOverlay = false;   // F1
let worldLogVisible = false; // L

// Debug weather cycle index
let weatherIdx = 0;

// ─── Phase 5: Narration card + screen fade ────────────────────────────────────
let narrationCard = null;  // { title, text, onDismiss, startMs }
let screenFade    = null;  // { direction, color, durationMs, startMs, onDone }

// ─── Phase 6: Dialogue ────────────────────────────────────────────────────────
// Dialogue and Journal are managed by their modules. isOpen() checked in tick loop.

// ─── Phase 9: Lock resolution toast ──────────────────────────────────────────
// { type: "success"|"failure"|"hard_fail", text: string, remainMs: number }
let lockToast = null;

// ─── Phase 13: Trap notification toast ───────────────────────────────────────
// { text: string, type: "detect"|"trigger"|"disarm", remainMs: number }
let trapToast = null;

// ─── Phase 14: Music / settings panel ────────────────────────────────────────
let settingsOpen = false;

// ─── Phase 15: Save / Load / Menu ────────────────────────────────────────────
let gamePhase = 'menu';   // 'menu' | 'playing' | 'paused'
let menu      = null;     // MainMenu instance
let saveToast = null;     // { text, remainMs, ok }

// ─── Bootstrap ────────────────────────────────────────────────────────────────

/** Called when the player commits to starting/resuming a game. */
function startGameLoop() {
  gamePhase = 'playing';
  loop.start();
  // Fire map-enter triggers
  Events.checkMapEnter('test_town');
}

async function init() {
  // ── Phase 15: Init Save DB ──
  await Save.init();

  mapData     = await loadMap('/data/maps/test_town.json');
  mapRenderer = new MapRenderer(renderer, camera);
  lighting.setMapData(mapData);

  const [aldricDef, lyriaDef, kaelDef, miraDef] = await Promise.all([
    fetch('/data/characters/char_fighter_aldric.json').then(r => r.json()),
    fetch('/data/characters/char_mage_lyria.json').then(r => r.json()),
    fetch('/data/characters/char_thief_kael.json').then(r => r.json()),
    fetch('/data/characters/char_cleric_mira.json').then(r => r.json()),
  ]);

  const aldric = new Character(aldricDef);
  const lyria  = new Character(lyriaDef);
  const kael   = new Character(kaelDef);
  const mira   = new Character(miraDef);

  party = new Party();
  GameState.party = party;
  party.setMax(4);
  party.addMember(aldric);
  party.addMember(lyria);
  party.addMember(kael);
  party.addMember(mira);

  // ── Phase 9: Classes, Abilities ──
  const [classesData, abilitiesData] = await Promise.all([
    fetch('/data/classes/core_classes.json').then(r => r.json()),
    fetch('/data/abilities/core_abilities.json').then(r => r.json()),
  ]);
  Classes.load(classesData);
  Abilities.loadRegistry(abilitiesData);

  // Make globals accessible for console testing
  window.Classes   = Classes;
  window.Abilities = Abilities;
  window.Lock      = Lock;

  movement = new MovementController(input, mapData, party, camera, GameState);
  movement.setLeadPosition(aldricDef.position.tile_x, aldricDef.position.tile_y);

  // ── Phase 7: Secrets & Factions ──
  const [secretsData, factionsData] = await Promise.all([
    fetch('/data/secrets/test_secrets.json').then(r => r.json()),
    fetch('/data/factions/test_factions.json').then(r => r.json()),
  ]);
  Secrets.load(secretsData);
  Factions.load(factionsData);

  // ── Phase 8: Items, Inventory, Equipment ──
  const [itemsData, lootTablesData] = await Promise.all([
    fetch('/data/items/test_items.json').then(r => r.json()),
    fetch('/data/items/loot_tables.json').then(r => r.json()),
  ]);
  Items.loadRegistry(itemsData);
  LootTables.load(lootTablesData);

  // Wire inventory handlers so events can grant/remove items
  Inventory.setHandlers({
    onGrantSecret: id  => Secrets.grant(id),
    onFireEvent:   id  => Events.fireActionTrigger('manual_event', { event_id: id }),
    onShowMsg:     msg => console.log('[Inventory]', msg),
  });

  // Wire equipment handlers for on-equip effects
  Equipment.setHandlers({
    onFireEvent:   id              => Events.fireActionTrigger('manual_event', { event_id: id }),
    onGrantSecret: id              => Secrets.grant(id),
    onGrantSkill:  (charId, skill) => console.log(`[Equipment] Skill unlocked: ${skill} for ${charId}`),
    getParty:      ()              => party,
  });

  // Wire event engine's inventory actions
  Events.setInventoryHandlers(
    (itemId, qty) => Inventory.add(itemId, qty),
    (itemId, qty) => Inventory.remove(itemId, qty),
    (tableId)     => LootTables.roll(tableId),
  );

  // Initialise InventoryUI
  InventoryUI.init(renderer, input);

  // Add window reference for console access
  window.GameState  = GameState;
  window.Party      = party;
  window.Save       = Save;

  // ── Phase 10: Combat Engine ──
  const combat = new CombatEngine(renderer, input);
  window.Combat = combat;

  // ── Phase 12: Progression ──
  TrainingUI.init(renderer, input);
  const mentorsData = await fetch('/data/progression/mentors.json').then(r => r.json());
  Progression.loadMentors(mentorsData);
  Progression.setEventFireHandler(eventId => Events.fireEvent(eventId));
  Progression.setNotificationHandler((title, text, onDismiss) => {
    narrationCard = { title, text, onDismiss: onDismiss ?? (() => {}), startMs: performance.now() };
  });
  Progression.setWorldLogHandler(text => {
    GameState.worldLog.push({ turn: GameState.currentTurn, text });
  });
  Events.setProgressionHandler((characterDef, abilityId) => {
    Progression.grantSkillUnlock(characterDef, abilityId);
  });
  Dialogue.setMentorTrainingHandler(mentorId => {
    Dialogue.close();
    TrainingUI.open(mentorId, party, Inventory, Factions, () => {});
  });
  window.Progression = Progression;
  window.TrainingUI  = TrainingUI;

  // ── Phase 13: Encounters, ArenaGenerator, Traps ──
  // Load arena templates
  const [corridorTemplate, fieldTemplate, chamberTemplate] = await Promise.all([
    fetch('/data/arenas/arena_stone_corridor.json').then(r => r.json()),
    fetch('/data/arenas/arena_open_field.json').then(r => r.json()),
    fetch('/data/arenas/arena_dungeon_chamber.json').then(r => r.json()),
  ]);
  ArenaGenerator.loadTemplates([corridorTemplate, fieldTemplate, chamberTemplate]);

  // Load encounter pools
  const encounterPoolData = await fetch('/data/encounters/pool_test_wilderness.json').then(r => r.json());
  Encounters.loadPool(encounterPoolData);
  Encounters.resetForMap('test_town');

  // Wire encounter trigger → combat
  Encounters.setOnTrigger((encounter, pool) => {
    const arenaResult = ArenaGenerator.generate(null, encounter, party.active);
    if (!arenaResult) { console.warn('[Encounters] ArenaGenerator returned null'); return; }

    console.log(`[Encounters] Initiating combat: ${encounter.encounter_id}`);
    MusicEngine.setCombatMode(true);
    combat.initiate(
      encounter.encounter_id,
      arenaResult.combatants,
      (outcome) => {
        MusicEngine.setCombatMode(false);
        if (outcome === 'victory') MusicEngine.playStinger('victory');
        console.log(`[Encounters] Combat ended: ${outcome}`);
        if (outcome === 'defeat') Events.fireActionTrigger('combat_complete', { outcome: 'defeat' });
      },
      arenaResult.lootTableId,
      arenaResult.template,
    );
  });

  // Load traps from the current map
  Traps.loadFromMap(mapData.def);
  Traps.setFireEvent(id => Events.fireEvent(id));

  Traps.setOnDetect(trap => {
    trapToast = {
      text: `Trap detected! ${trap.trap_type.replace('_', ' ')} at (${trap.tile_x}, ${trap.tile_y})`,
      type: 'detect',
      remainMs: 3000,
    };
  });

  Traps.setOnTrigger((trap, effects) => {
    const dmg = effects.find(e => e.type === 'deal_damage');
    const msg = dmg
      ? `Trap triggered! ${trap.trap_type.replace('_', ' ')} — you take ${dmg.value} damage!`
      : `Trap triggered! ${trap.trap_type.replace('_', ' ')}!`;
    trapToast = { text: msg, type: 'trigger', remainMs: 3500 };
    GameState.worldLog.push({ turn: GameState.currentTurn, text: msg });
  });

  Traps.setOnDisarm(trap => {
    trapToast = {
      text: `Trap disarmed: ${trap.trap_type.replace('_', ' ')}.`,
      type: 'disarm',
      remainMs: 2500,
    };
  });

  // Expose for console testing
  window.Encounters     = Encounters;
  window.ArenaGenerator = ArenaGenerator;
  window.Traps          = Traps;

  // Bootstrap starting equipment from character definitions
  // Characters start with items already equipped (not from inventory)
  for (const char of party.active) {
    Equipment.initFromCharDef(char.id, char.def);
  }

  // Add starting torch to inventory (so the party has one to use/transfer)
  Inventory.add('item_torch', 1);

  Events.setSecretHandlers(
    id         => Secrets.grant(id),
    id         => Secrets.revoke(id)
  );
  Secrets.setOnDiscover(() => MusicEngine.playStinger('discovery'));
  Events.setFactionHandler((id, delta) => Factions.modify(id, delta));

  // ── Phase 6: NPC system init ──
  Dialogue.init(renderer, input);
  Journal.init(renderer, input);

  const npcsData = await fetch('/data/npcs/test_npcs.json').then(r => r.json());
  NPCs.load(npcsData);
  NPCs.spawnForMap('test_town');

  // Let movement controller check NPC tiles for blocking
  movement.setNPCLookup((x, y) => NPCs.getAtTile(GameState.currentMap, x, y));

  // E-key on NPC → open dialogue
  movement.setOnNPCInteract((npc) => {
    if (!Dialogue.isOpen()) {
      Dialogue.open(npc.def.npc_id, npc.dialogueRoot);
    }
  });

  // Wire Events.show_dialogue action to Dialogue module
  Events.setDialogueHandler((npcId, rootNodeId, onClose) => {
    Dialogue.open(npcId, rootNodeId).then(() => {
      // Dialogue.close() fires its own npc_dialogue_completed trigger;
      // onClose() resumes the event queue. Wire it via a polling check or
      // store and call on next Dialogue.close().
      // Simplest: resolve immediately and let the action complete.
      onClose();
    });
  });

  // Wire spawn/despawn NPC actions
  Events.setNPCHandlers(
    (npcId, mapId, x, y) => NPCs.spawn(npcId, mapId, x, y),
    (npcId) => NPCs.despawn(npcId)
  );

  // ── Phase 9: Lock-aware interaction handler ──
  movement.setOnInteract((obj) => {
    if (obj.interaction_type && obj.lock_type) {
      _resolveLockInteraction(obj);
    } else {
      Events.fireActionTrigger('object_interacted', { object_id: obj.object_id });
    }
  });

  movement.setOnMove((x, y) => {
    if (!Events.isPaused()) {
      Events.checkLocationTriggers(GameState.currentMap, x, y);
    }
    // Phase 13: check encounter zones
    if (!combat.isActive()) {
      Encounters.checkZones(GameState.currentMap, x, y, mapData.def);
    }
    // Phase 13: check trap step (only if not already in combat)
    if (!combat.isActive()) {
      const lead = party.getLead();
      if (lead) Traps.checkStep(x, y, lead, GameState.currentTurn);
    }
  });

  camera.setMapBounds(mapData.width, mapData.height);
  camera.snapTo(movement.leadX, movement.leadY);

  // ── Phase 5: Load events ──
  const eventsData = await fetch('/data/events/test_events.json').then(r => r.json());
  Events.load(eventsData);
  Events.setMapData(mapData);
  Events.setGameTime(gameTime);
  Events.setWeather(weather);

  Events.setNarrationHandler((title, text, onDismiss) => {
    narrationCard = { title, text, onDismiss, startMs: performance.now() };
  });

  Events.setScreenFadeHandler((direction, color, durationMs, onDone) => {
    screenFade = { direction, color, durationMs, onDone, startMs: performance.now() };
  });

  GameState.currentMap = 'test_town';

  // ── Phase 14: Music Engine wiring ──
  MusicEngine.setFlags(GameState.flags);
  MusicEngine.setGameTime(gameTime);
  MusicEngine.setWeather(weather);

  // Wire set_music_mood event action
  Events.setMusicHandler((mood, durationTurns) => MusicEngine.forceMood(mood, durationTurns));

  // Re-evaluate when time of day changes
  gameTime.onStateChange((newState) => {
    MusicEngine.evaluate();
    console.log(`Time → ${newState}  (${_timeString()}  Day ${gameTime.dayNumber})`);
  });

  // Load town profile and start playback on first user interaction
  MusicEngine.loadProfile('music_town_peaceful');
  MusicEngine.loadProfile('music_dungeon_tense');

  // Initialize AudioContext on the first user input (browser autoplay policy)
  const _musicInit = () => {
    if (!MusicEngine.isInitialized()) {
      MusicEngine.init();
      MusicEngine.setProfile(mapData.def.music_profile ?? 'music_town_peaceful');
    }
  };
  document.addEventListener('keydown',  _musicInit, { once: true });
  document.addEventListener('mousedown', _musicInit, { once: true });

  loop.onTick((deltaMs) => {
    // While paused or in menu, the _menuFrame rAF loop handles input/render.
    if (gamePhase !== 'playing') { input.clearFrameState(); return; }

    // Narration card: dismiss on any keypress
    if (narrationCard && input.wasAnyKeyPressed()) {
      const cb = narrationCard.onDismiss;
      narrationCard = null;
      cb();
      input.clearFrameState();
      return;
    }

    // Block all other input while event engine is paused (screen_fade, etc.)
    if (Events.isPaused()) {
      input.clearFrameState();
      return;
    }

    // ── Phase 15: Pause menu (Escape) ──
    if (input.wasKeyPressed('Escape') && !settingsOpen) {
      gamePhase = 'paused';
      menu.setOnResume(() => { gamePhase = 'playing'; });
      menu.showPause();
      input.clearFrameState();
      return;
    }

    // ── Phase 15: Quick save (F5) / quick load (F9) ──
    if (input.wasKeyPressed('F5')) {
      Save.save(0, 'Quick Save').then(() => {
        saveToast = { text: 'Game saved.', remainMs: 2000, ok: true };
      }).catch(e => {
        saveToast = { text: 'Save failed: ' + e.message, remainMs: 3000, ok: false };
      });
      input.clearFrameState();
      return;
    }
    if (input.wasKeyPressed('F9')) {
      Save.load(0).then(data => {
        if (!data) { saveToast = { text: 'No save in slot 1.', remainMs: 2000, ok: false }; return; }
        camera.snapTo(movement.leadX, movement.leadY);
        if (MusicEngine.isInitialized()) { MusicEngine.setFlags(GameState.flags); MusicEngine.evaluate(); }
        saveToast = { text: 'Game loaded.', remainMs: 2000, ok: true };
      }).catch(e => {
        saveToast = { text: 'Load failed: ' + e.message, remainMs: 3000, ok: false };
      });
      input.clearFrameState();
      return;
    }

    // ── Phase 14: Settings panel input handling ──
    if (settingsOpen) {
      if (input.wasKeyPressed('KeyO')) settingsOpen = false;
      // Volume slider click (PX=210, PY=150, sliderX=222, sliderY=192, sliderW=196)
      if (input.wasMouseClicked()) {
        const mouse = input.getMouseScreen();
        const sliderX = 222, sliderY = 192, sliderW = 196, sliderH = 10;
        if (mouse.x >= sliderX && mouse.x <= sliderX + sliderW &&
            mouse.y >= sliderY && mouse.y <= sliderY + sliderH) {
          MusicEngine.setVolume((mouse.x - sliderX) / sliderW);
          if (MusicEngine.isMuted()) MusicEngine.unmute();
        }
      }
      input.clearFrameState();
      return;
    }

    // ── Phase 6: Dialogue input handling ──
    if (Dialogue.isOpen()) {
      if (input.wasKeyPressed('Space'))   Dialogue.handleKey('Space');
      if (input.wasKeyPressed('Escape'))  Dialogue.handleKey('Escape');
      if (input.wasKeyPressed('Digit1'))  Dialogue.handleKey('Digit1');
      if (input.wasKeyPressed('Digit2'))  Dialogue.handleKey('Digit2');
      if (input.wasKeyPressed('Digit3'))  Dialogue.handleKey('Digit3');
      if (input.wasKeyPressed('Digit4'))  Dialogue.handleKey('Digit4');
      input.clearFrameState();
      return;  // block movement while dialogue is open
    }

    // ── Phase 7: Journal input handling ──
    if (Journal.isOpen()) {
      for (const code of ['Escape','KeyJ','Digit1','Digit2','Digit3','Digit4','ArrowUp','ArrowDown']) {
        if (input.wasKeyPressed(code)) Journal.handleKey(code);
      }
      input.clearFrameState();
      return;  // block movement while journal is open
    }

    // ── Phase 12: Training UI input handling ──
    if (TrainingUI.isOpen()) {
      for (const code of ['Escape','ArrowLeft','ArrowRight']) {
        if (input.wasKeyPressed(code)) TrainingUI.handleKey(code);
      }
      input.clearFrameState();
      return;
    }

    // ── Phase 8: Inventory input handling ──
    if (InventoryUI.isOpen()) {
      if (input.wasKeyPressed('Escape') || input.wasKeyPressed('KeyI')) {
        InventoryUI.handleKey('Escape');
      }
      input.clearFrameState();
      return;  // block movement while inventory is open
    }

    // ── Phase 10: Combat handling ──
    if (combat.isActive()) {
      combat.handleInput(input);
      input.clearFrameState();
      return;
    }

    // C — trigger test combat
    if (input.wasKeyPressed('KeyC') && !combat.isActive()) {
      const [fighter, mage, thief, cleric] = party.active;
      MusicEngine.setCombatMode(true);
      combat.initiate('test_encounter', [
        { entity: fighter, side: 'party', tile_x: 2, tile_y: 7 },
        { entity: mage,    side: 'party', tile_x: 2, tile_y: 9 },
        { entity: thief,   side: 'party', tile_x: 2, tile_y: 11 },
        { entity: cleric,  side: 'party', tile_x: 2, tile_y: 13 },
        { entity: { character_id: 'enemy_skeleton_01', display_name: 'Skeleton', class_id: 'skeleton',
                    base_stats: { hp: 15, max_hp: 15, speed: 4, attack: 4, defense: 2, magic: 0 },
                    tags: ['undead'] },
          side: 'enemy', tile_x: 20, tile_y: 7 },
        { entity: { character_id: 'enemy_skeleton_02', display_name: 'Skeleton', class_id: 'skeleton',
                    base_stats: { hp: 15, max_hp: 15, speed: 4, attack: 4, defense: 2, magic: 0 },
                    tags: ['undead'] },
          side: 'enemy', tile_x: 20, tile_y: 10 },
        { entity: { character_id: 'enemy_skeleton_03', display_name: 'Skeleton', class_id: 'skeleton',
                    base_stats: { hp: 15, max_hp: 15, speed: 4, attack: 4, defense: 2, magic: 0 },
                    tags: ['undead'] },
          side: 'enemy', tile_x: 20, tile_y: 13 },
      ], (outcome) => {
        MusicEngine.setCombatMode(false);
        if (outcome === 'victory') MusicEngine.playStinger('victory');
        if (outcome === 'defeat') Events.fireActionTrigger('combat_complete', { outcome: 'defeat' });
        console.log(`[Combat] Returned to overworld. Outcome: ${outcome}`);
      }, 'loot_table_skeleton');
      input.clearFrameState();
      return;
    }

    // Decay save toast
    if (saveToast) {
      saveToast.remainMs -= deltaMs;
      if (saveToast.remainMs <= 0) saveToast = null;
    }

    // Decay lock toast
    if (lockToast) {
      lockToast.remainMs -= deltaMs;
      if (lockToast.remainMs <= 0) lockToast = null;
    }

    // Decay trap toast
    if (trapToast) {
      trapToast.remainMs -= deltaMs;
      if (trapToast.remainMs <= 0) trapToast = null;
    }

    // ── Phase 13: Trap passive detection (runs each tick even without movement) ──
    if (!combat.isActive()) {
      Traps.passiveCheck(movement.leadX, movement.leadY, party.active);
    }

    // ── Phase 13: Trap disarm (E key while standing on a detected trap) ──
    // Must run before movement.tick() so the E press isn't consumed by NPC/object interact.
    if (!combat.isActive() && input.wasKeyPressed('KeyE')) {
      const onTrap = Traps.getTrapAt(movement.leadX, movement.leadY, 0);
      if (onTrap && onTrap.detected && !onTrap.triggered) {
        const lead = party.getLead();
        const result = Traps.attemptDisarm(onTrap, party.active, lead, GameState.currentTurn);
        _showLockToast(result.message, result.success ? 'success' : 'failure', 3000);
        input.clearFrameState();  // consume E so movement.tick() doesn't double-fire
        return;
      }
    }

    const prevTurn = GameState.currentTurn;
    movement.tick(deltaMs);
    const movementDelta = GameState.currentTurn - prevTurn;

    if (movementDelta > 0) {
      gameTime.advance(movementDelta);
      Events.tick(GameState.currentTurn);
      MusicEngine.tick();
      MusicEngine.evaluate();
      Traps.onTurnAdvance(GameState.currentTurn);
      // ── Phase 6: Update NPC schedules and facing ──
      NPCs.update(gameTime);
      NPCs.updateFacing(GameState.currentMap, movement.leadX, movement.leadY);
      // checkLocationTriggers is fired by setOnMove callback above
    } else {
      // Update facing even when stationary (player turns in place)
      NPCs.updateFacing(GameState.currentMap, movement.leadX, movement.leadY);
    }

    // J — toggle journal
    if (input.wasKeyPressed('KeyJ')) Journal.toggle();

    // I — toggle inventory
    if (input.wasKeyPressed('KeyI')) InventoryUI.toggle();

    // F — spatial secret search + active trap detection on faced tile
    if (input.wasKeyPressed('KeyF')) {
      Secrets.search(mapData, movement.leadX, movement.leadY);
      // Determine faced tile
      const facedTile = _getFacedTile(movement);
      if (facedTile) {
        const found = Traps.activeSearch(facedTile.x, facedTile.y, party.active);
        if (!found) {
          // Show brief "nothing found" feedback
          trapToast = { text: 'You search carefully but find no traps here.', type: 'detect', remainMs: 1800 };
        }
      }
    }

    // T — advance 12 turns (~2 in-world hours) without moving
    if (input.wasKeyPressed('KeyT')) {
      gameTime.advance(12);
      NPCs.update(gameTime);
      console.log(`Time skip → ${gameTime.getState()}  (${_timeString()})`);
    }

    // W — cycle weather (W also triggers north movement, acceptable for demo)
    if (input.wasKeyPressed('KeyW')) {
      weatherIdx = (weatherIdx + 1) % WEATHER_CYCLE.length;
      const next = WEATHER_CYCLE[weatherIdx];
      weather.setState(next);
      MusicEngine.evaluate();
      console.log(`Weather → ${next}`);
    }

    if (input.wasKeyPressed('F1')) debugOverlay = !debugOverlay;
    if (input.wasKeyPressed('KeyL')) worldLogVisible = !worldLogVisible;
    if (input.wasKeyPressed('KeyO')) settingsOpen = !settingsOpen;
    if (input.wasKeyPressed('KeyM')) MusicEngine.toggleMute();

    input.clearFrameState();
  });

  loop.onRender((interpolation, deltaMs) => {
    camera.update();

    // ── Phase 10: Combat rendering takes over when active ──
    if (combat.isActive()) {
      combat.update(deltaMs);
      combat.render();
      renderer.composite();
      return;
    }

    // Clear layer 8 (EFFECTS) — combat grid/highlights write here; overworld has nothing to draw
    renderer.clearLayer(LAYER.EFFECTS);

    // Render map layers 0–5
    mapRenderer.render(mapData, movement.leadX, movement.leadY);

    // Render party (layer 4) — clears CHARACTERS + ENTITY_SHADOW, draws party
    party.render(renderer, camera, movement.leadX, movement.leadY, deltaMs);

    // Render NPCs (layer 4) — draws on top of party layer (Y-sorted among themselves)
    NPCs.render(renderer, camera, GameState.currentMap, deltaMs);

    // ── Weather (Layer 6) ──
    const leadScreen = camera.worldToScreen(movement.leadX, movement.leadY);
    weather.setPlayerScreenPos(leadScreen.x + 16, leadScreen.y + 16);
    weather.update(deltaMs);

    // ── Lighting (Layer 7) ──
    const lightSources = _buildLightSources();
    lighting.render(deltaMs, lightSources);

    // ── UI (Layer 9 + 10) ──
    renderUI(deltaMs);

    // ── Screen fade (Layer 11) ──
    renderer.clearLayer(LAYER.TRANSITION);
    if (screenFade) {
      const elapsed = performance.now() - screenFade.startMs;
      const t       = Math.min(elapsed / screenFade.durationMs, 1.0);
      const alpha   = screenFade.direction === 'out' ? t : 1 - t;
      if (alpha > 0.001) {
        const fctx = renderer.getLayerContext(LAYER.TRANSITION);
        fctx.globalAlpha = alpha;
        fctx.fillStyle   = screenFade.color;
        fctx.fillRect(0, 0, 640, 480);
        fctx.globalAlpha = 1;
      }
      if (t >= 1.0) {
        const onDone = screenFade.onDone;
        screenFade = null;
        onDone();
      }
    }

    renderer.composite();
  });

  // ── Phase 15: Save system wiring ──
  Save.connect({ GameState, party, mapData, Inventory, Events, gameTime, weather, movement, Character });

  // ── Phase 15: Main menu ──
  menu = new MainMenu(renderer.canvas, input, Save);

  menu.setOnNewGame(() => {
    gamePhase = 'playing';
    loop.start();
    Events.checkMapEnter('test_town');
  });

  menu.setOnLoadGame(async (data) => {
    // After load, snap camera and re-evaluate music
    camera.snapTo(movement.leadX, movement.leadY);
    NPCs.update(gameTime);
    if (MusicEngine.isInitialized()) {
      MusicEngine.setFlags(GameState.flags);
      MusicEngine.setWeather(weather);
      MusicEngine.evaluate();
    }
    gamePhase = 'playing';
    loop.start();
  });

  menu.setOnResume(() => {
    gamePhase = 'playing';
  });

  menu.setOnMainMenu(async () => {
    gamePhase = 'menu';
    loop.stop?.();  // stop if loop supports it
    await menu.showTitle();
  });

  // Show title screen first
  await menu.showTitle();

  // Menu render loop (runs independently from game loop)
  function _menuFrame(ts) {
    if (gamePhase === 'menu' || gamePhase === 'paused') {
      const delta = _menuFrame._last ? Math.min(ts - _menuFrame._last, 100) : 16;
      _menuFrame._last = ts;

      if (gamePhase === 'paused') {

        camera.update();
        renderer.clearLayer(LAYER.EFFECTS);
        mapRenderer.render(mapData, movement.leadX, movement.leadY);

        NPCs.render(renderer, camera, GameState.currentMap, 0);
        weather.update(0);

    } else {

    requestAnimationFrame(_menuFrame);

// ─── Phase 13: Helpers ────────────────────────────────────────────────────────

/** Return the tile one step ahead of the party lead in the current facing direction. */
function _getFacedTile(movement) {
  const lead = party.getLead();
  if (!lead) return null;
  const dir = lead.facing;
  const dx  = dir === 'east' ? 1 : dir === 'west' ? -1 : 0;
  const dy  = dir === 'south' ? 1 : dir === 'north' ? -1 : 0;
  return { x: movement.leadX + dx, y: movement.leadY + dy };
}

// ─── Phase 9: Lock interaction resolution ────────────────────────────────────

/**
 * Resolve a lock-gated object interaction, show appropriate UI feedback,
 * execute inline actions, track ability use, and fire result events.
 * @param {object} obj  — map object definition
 */
function _resolveLockInteraction(obj) {
  const result = Lock.resolve(
    obj.interaction_type,
    obj.lock_type,
    party.active,
    obj.soft_outcomes ?? null,
  );

  console.log(`[Lock] ${obj.object_id} (${obj.interaction_type}/${obj.lock_type}) → ${result.outcome}`);

  // ── UI feedback ──
  if (!result.success) {
    if (result.outcome === 'hard_lock_fail') {
      const classes = result.required_classes?.map(c => c.class_label).join(' or ') ?? 'a specialist';
      _showLockToast(`Requires ${classes} — ${result.description}`, 'hard_fail', 3500);
    } else {
      _showLockToast(result.description, 'failure', 2500);
    }
    // Fire on_fail_event if defined
    if (obj.on_fail_event) Events.fireEvent(obj.on_fail_event);
    return;
  }

  // Success feedback by outcome type
  if (result.outcome === 'class_advantage') {
    _showLockToast(result.description, 'success', 2200);
  } else if (result.outcome === 'class_disadvantage_success') {
    _showLockToast(result.description, 'success', 2200);
  } else if (result.outcome === 'no_class_success') {
    _showLockToast(`You manage it, but awkwardly. ${result.description}`, 'neutral', 2500);
  }

  // Execute inline action from soft_outcomes (e.g. modify_map_object, grant_secret)
  if (result.action) {
    Events.executeAction(result.action);
  }

  // Track ability use on the acting character (with progression milestone check)
  if (result.ability_id && result.acting_char_def) {
    Progression.recordUse(result.acting_char_def, result.ability_id);
  }

  // Fire the success event
  if (obj.on_interact_event) Events.fireEvent(obj.on_interact_event);

  // Also fire generic object_interacted for any event listeners watching this object
  Events.fireActionTrigger('object_interacted', { object_id: obj.object_id });
}

/**
 * Show a lock resolution toast with colour-coded feedback.
 * @param {string} text
 * @param {"success"|"neutral"|"failure"|"hard_fail"} type
 * @param {number} durationMs
 */
function _showLockToast(text, type, durationMs) {
  lockToast = { text, type, remainMs: durationMs };
}

// ─── Build light sources from party equipment ─────────────────────────────────

const LIGHT_RADII = { torch: 4 * 32, lantern: 6 * 32 };

function _buildLightSources() {
  const sources = [];
  if (!party) return sources;
  for (let i = 0; i < party.active.length; i++) {
    const char   = party.active[i];
    const radius = _lightRadius(char);
    if (radius <= 0) continue;
    const pos    = party.getMemberPosition(movement.leadX, movement.leadY, i);
    const screen = camera.worldToScreen(pos.tile_x, pos.tile_y);
    sources.push({ x: screen.x + 16, y: screen.y + 16, radius });
  }
  return sources;
}

function _lightRadius(char) {
  // Phase 8: check Equipment module first
  const { radius } = Equipment.getLightRadius(char.id);
  if (radius > 0) return radius;

  // Fallback: check character def's equipment field (for backward compat)
  const eq = char.def.equipment;
  if (!eq) return 0;
  for (const v of Object.values(eq)) {
    if (typeof v !== 'string') continue;
    if (v.includes('lantern')) return LIGHT_RADII.lantern;
    if (v.includes('torch'))   return LIGHT_RADII.torch;
  }
  if (char.def.tags?.includes('light_source')) return LIGHT_RADII.torch;
  return 0;
}

// ─── Narration card ────────────────────────────────────────────────────────────

function _renderNarrationCard(ctx, card, elapsed) {
  const alpha       = Math.min(elapsed / 300, 1.0);
  const slideOffset = Math.round((1 - alpha) * 30);

  const CW = 400, CH = 170;
  const cx = Math.round((640 - CW) / 2);
  const cy = Math.round((480 - CH) / 2) + slideOffset;

  ctx.save();

  // Dim background
  ctx.globalAlpha = 0.72 * alpha;
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, 640, 480);

  // Card body
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(14,18,28,0.97)';
  ctx.fillRect(cx, cy, CW, CH);
  ctx.strokeStyle = '#556677';
  ctx.lineWidth = 1;
  ctx.strokeRect(cx, cy, CW, CH);

  // Inner top border accent
  ctx.strokeStyle = '#33aacc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx + 8, cy + 1);
  ctx.lineTo(cx + CW - 8, cy + 1);
  ctx.stroke();

  ctx.textBaseline = 'top';
  let textY = cy + 20;

  if (card.title) {
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffee88';
    ctx.fillText(card.title, cx + CW / 2, textY);
    textY += 22;
    // Separator
    ctx.strokeStyle = '#334455';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx + 20, textY - 4);
    ctx.lineTo(cx + CW - 20, textY - 4);
    ctx.stroke();
  }

  // Body text with word wrap
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#dde8ee';
  const lines = _wrapText(ctx, card.text, CW - 48);
  for (const line of lines) {
    ctx.fillText(line, cx + 24, textY);
    textY += 16;
  }

  // "Press any key" prompt
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(102,136,153,${alpha})`;
  ctx.fillText('— Press any key to continue —', cx + CW / 2, cy + CH - 16);

  ctx.restore();
}

function _wrapText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line    = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

// ─── World log panel ──────────────────────────────────────────────────────────

function _renderWorldLog(ctx) {
  const entries = GameState.worldLog.slice(-20);
  const PW = 310, ROW = 13;
  const PH = Math.max(entries.length, 1) * ROW + 24;
  const px = 4, py = 4;

  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.88)';
  ctx.fillRect(px, py, PW, PH);
  ctx.strokeStyle = '#334455';
  ctx.lineWidth = 1;
  ctx.strokeRect(px, py, PW, PH);

  ctx.font = 'bold 9px monospace';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#33aacc';
  ctx.fillText('WORLD LOG  [L] close', px + 6, py + 5);

  if (entries.length === 0) {
    ctx.fillStyle = '#556677';
    ctx.fillText('(empty)', px + 6, py + 18);
  } else {
    ctx.font = '9px monospace';
    entries.forEach((entry, i) => {
      const ey = py + 18 + i * ROW;
      ctx.fillStyle = '#446688';
      ctx.fillText(`T${entry.turn}`, px + 6, ey);
      ctx.fillStyle = '#aabbcc';
      ctx.fillText(entry.text, px + 42, ey);
    });
  }
  ctx.restore();
}

// ─── Helpers ──────────────────────────────────────────────────────────────────

function _timeString() {
  const h = String(gameTime.getHour()).padStart(2, '0');
  const m = String(gameTime.getMinute()).padStart(2, '0');
  return `${h}:${m}`;
}

function _weatherIcon(state) {
  const icons = {
    clear:      '☀',
    overcast:   '☁',
    rain:       '🌧',
    heavy_rain: '⛈',
    fog:        '🌫',
    snow:       '🌨',
    blizzard:   '❄',
    storm:      '⛈',
  };
  return icons[state] ?? '?';
}

// ─── Phase 13: Trap overlay renderer ─────────────────────────────────────────

/**
 * Draw small skull/warning markers over detected traps on the world map.
 */
function _renderTrapOverlay(ctx) {
  const detected = Traps.getDetectedTraps();
  for (const trap of detected) {
    const screen = camera.worldToScreen(trap.tile_x, trap.tile_y);
    const cx = screen.x + 16;
    const cy = screen.y + 16;

    ctx.save();
    // Pulsing red glow
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 400);
    ctx.globalAlpha = 0.6 + 0.4 * pulse;

    // Red X marker
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth   = 2;
    ctx.beginPath(); ctx.moveTo(cx - 5, cy - 5); ctx.lineTo(cx + 5, cy + 5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + 5, cy - 5); ctx.lineTo(cx - 5, cy + 5); ctx.stroke();

    ctx.restore();
  }
}

/**
 * Render a trap notification toast.
 */
function _renderTrapToast(ctx, toast) {
  const COLORS = {
    detect:  { bg: '#1a1a2a', border: '#4444ff', text: '#aaaaff' },
    trigger: { bg: '#2a0a0a', border: '#ff4444', text: '#ffaaaa' },
    disarm:  { bg: '#0a1a0a', border: '#44ff44', text: '#aaffaa' },
  };
  const scheme = COLORS[toast.type] ?? COLORS.detect;

  ctx.save();
  ctx.font = '11px monospace';

  const maxWidth = 400;
  const lines    = _wrapText(ctx, toast.text, maxWidth);
  const PW       = maxWidth + 24;
  const PH       = lines.length * 15 + 16;
  const px       = Math.round((640 - PW) / 2);
  const py       = 310;

  const alpha = toast.remainMs < 600 ? (toast.remainMs / 600) : 1.0;
  ctx.globalAlpha = alpha;

  ctx.fillStyle   = scheme.bg;
  ctx.fillRect(px, py, PW, PH);
  ctx.strokeStyle = scheme.border;
  ctx.lineWidth   = 1;
  ctx.strokeRect(px, py, PW, PH);

  ctx.fillStyle    = scheme.text;
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'top';
  lines.forEach((line, i) => ctx.fillText(line, px + 12, py + 8 + i * 15));

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─── Lock toast renderer ──────────────────────────────────────────────────────

/**
 * Render a lock resolution toast at the bottom-centre of the screen.
 * @param {CanvasRenderingContext2D} ctx
 * @param {{ text: string, type: string, remainMs: number }} toast
 */
function _renderLockToast(ctx, toast) {
  const COLORS = {
    success:   { bg: '#1a3a1a', border: '#44bb44', text: '#aaffaa' },
    neutral:   { bg: '#2a2a1a', border: '#bbbb44', text: '#ffffaa' },
    failure:   { bg: '#3a1a1a', border: '#bb4444', text: '#ffaaaa' },
    hard_fail: { bg: '#2a1a2a', border: '#aa44aa', text: '#ffaaff' },
  };
  const scheme = COLORS[toast.type] ?? COLORS.neutral;

  ctx.save();
  ctx.font = '11px monospace';

  const maxWidth = 480;
  const lines    = _wrapText(ctx, toast.text, maxWidth);
  const PW       = maxWidth + 24;
  const PH       = lines.length * 15 + 16;
  const px       = Math.round((640 - PW) / 2);
  const py       = 340;

  // Fade out in last 600 ms
  const alpha = toast.remainMs < 600 ? (toast.remainMs / 600) : 1.0;
  ctx.globalAlpha = alpha;

  ctx.fillStyle = scheme.bg;
  ctx.fillRect(px, py, PW, PH);
  ctx.strokeStyle = scheme.border;
  ctx.lineWidth = 1;
  ctx.strokeRect(px, py, PW, PH);

  ctx.fillStyle   = scheme.text;
  ctx.textAlign   = 'left';
  ctx.textBaseline = 'top';
  lines.forEach((line, i) => ctx.fillText(line, px + 12, py + 8 + i * 15));

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─── Phase 14: Settings Panel ────────────────────────────────────────────────

/**
 * Renders a compact settings panel over the DIALOGUE layer.
 * Shows: volume slider, mute toggle, active mood, all MOOD_STATES listed.
 * Mouse click on the volume slider bar adjusts volume.
 */
function _renderSettingsPanel(ctx) {
  const PW = 220, PH = 180;
  const PX = Math.round((640 - PW) / 2);
  const PY = Math.round((480 - PH) / 2);

  ctx.save();

  // Background
  ctx.fillStyle = 'rgba(10,14,22,0.96)';
  ctx.fillRect(PX, PY, PW, PH);
  ctx.strokeStyle = '#445566';
  ctx.lineWidth = 1;
  ctx.strokeRect(PX, PY, PW, PH);

  // Title
  ctx.fillStyle = '#ffe880';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('SETTINGS  [O] to close', PX + PW / 2, PY + 8);

  // Separator
  ctx.strokeStyle = '#334455';
  ctx.beginPath();
  ctx.moveTo(PX + 10, PY + 22);
  ctx.lineTo(PX + PW - 10, PY + 22);
  ctx.stroke();

  // Volume label
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#aaaaaa';
  ctx.fillText('Volume  [M] mute', PX + 12, PY + 28);

  // Volume slider
  const sliderX = PX + 12, sliderY = PY + 42, sliderW = PW - 24, sliderH = 10;
  ctx.fillStyle = '#223344';
  ctx.fillRect(sliderX, sliderY, sliderW, sliderH);
  ctx.fillStyle = MusicEngine.isMuted() ? '#555555' : '#44aaee';
  ctx.fillRect(sliderX, sliderY, Math.round(sliderW * MusicEngine.getVolume()), sliderH);
  ctx.strokeStyle = '#557799';
  ctx.strokeRect(sliderX, sliderY, sliderW, sliderH);

  // Volume percentage
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'right';
  ctx.fillText(
    MusicEngine.isMuted() ? 'MUTED' : `${Math.round(MusicEngine.getVolume() * 100)}%`,
    PX + PW - 12, PY + 42,
  );

  // Current mood display
  ctx.textAlign = 'left';
  ctx.fillStyle = '#aaaaaa';
  ctx.fillText('Current mood:', PX + 12, PY + 60);
  ctx.fillStyle = '#88ffcc';
  ctx.font = 'bold 10px monospace';
  ctx.fillText(MusicEngine.getCurrentMood().toUpperCase(), PX + 100, PY + 60);

  // All moods list in two columns
  ctx.font = '9px monospace';
  const midX = PX + PW / 2;
  const moods = MOOD_STATES;
  const currentMood = MusicEngine.getCurrentMood();
  let col = 0, row = 0;
  for (const m of moods) {
    const mx2 = col === 0 ? PX + 12 : midX + 4;
    const my2 = PY + 78 + row * 14;
    ctx.fillStyle = m === currentMood ? '#ffee66' : '#667788';
    ctx.textAlign = 'left';
    ctx.fillText((m === currentMood ? '▶ ' : '  ') + m, mx2, my2);
    col++;
    if (col >= 2) { col = 0; row++; }
  }

  // Hint
  ctx.fillStyle = '#446688';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('[O] close  |  click slider to set volume', PX + PW / 2, PY + PH - 12);

  ctx.restore();
}

// ─── Phase 15: Save toast renderer ───────────────────────────────────────────

function _renderSaveToast(ctx, toast) {
  const alpha = toast.remainMs < 500 ? toast.remainMs / 500 : 1.0;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = 'bold 11px monospace';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';
  const tw = ctx.measureText(toast.text).width + 24;
  const bx = 320 - tw / 2;
  const by = 64;
  ctx.fillStyle   = toast.ok ? 'rgba(10,30,10,0.92)' : 'rgba(30,10,10,0.92)';
  ctx.fillRect(bx, by, tw, 22);
  ctx.strokeStyle = toast.ok ? '#44cc44' : '#cc4444';
  ctx.lineWidth   = 1;
  ctx.strokeRect(bx, by, tw, 22);
  ctx.fillStyle   = toast.ok ? '#aaffaa' : '#ffaaaa';
  ctx.fillText(toast.text, 320, by + 5);
  ctx.restore();
}

// ─── Launch ───────────────────────────────────────────────────────────────────

init().catch(err => {
  console.error('Engine init failed:', err);
  document.body.style.color = '#f66';
  document.body.style.fontFamily = 'monospace';
  document.body.style.padding = '20px';
  document.body.textContent = 'Engine error: ' + err.message;
});
</script>
