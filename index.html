<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRPG Engine — Phase 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
  </style>
</head>
<body>
<script type="module">
import { Renderer, LAYER } from './engine/renderer.js';
import { Camera } from './engine/camera.js';
import { Input } from './engine/input.js';
import { GameLoop } from './engine/gameloop.js';
import { loadMap, MapRenderer } from './engine/map.js';

// ─── Engine Setup ─────────────────────────────────────────────────────────────
const renderer    = new Renderer();
const camera      = new Camera();
const loop        = new GameLoop(100);
const input       = new Input(renderer.canvas, camera, () => renderer.scale);

// ─── Game State ───────────────────────────────────────────────────────────────
let mapData     = null;
let mapRenderer = null;
let playerTileX = 20;
let playerTileY = 20;
let playerFacing = 'south';
let debugOverlay = false;   // toggled by F1

// ─── Movement ─────────────────────────────────────────────────────────────────
const MOVE_KEYS = {
  KeyW:      { dx:  0, dy: -1, facing: 'north' },
  ArrowUp:   { dx:  0, dy: -1, facing: 'north' },
  KeyS:      { dx:  0, dy:  1, facing: 'south' },
  ArrowDown: { dx:  0, dy:  1, facing: 'south' },
  KeyA:      { dx: -1, dy:  0, facing: 'west'  },
  ArrowLeft: { dx: -1, dy:  0, facing: 'west'  },
  KeyD:      { dx:  1, dy:  0, facing: 'east'  },
  ArrowRight:{ dx:  1, dy:  0, facing: 'east'  },
};

function handleMovement() {
  if (!mapData) return;

  for (const [code, move] of Object.entries(MOVE_KEYS)) {
    if (input.wasKeyPressed(code)) {
      const nx = playerTileX + move.dx;
      const ny = playerTileY + move.dy;

      // Always update facing direction
      playerFacing = move.facing;

      if (mapData.isPassable(nx, ny, mapData.currentFloor)) {
        playerTileX = nx;
        playerTileY = ny;
        camera.setTarget(playerTileX, playerTileY);
        console.log(`Player tile: ${playerTileX}, ${playerTileY}`);
      } else {
        // Blocked — check for an interactable object in that direction
        const obj = mapData.getObjectAt(nx, ny, mapData.currentFloor);
        if (obj && obj.interactable) {
          // Interaction prompt (full E-key system in Phase 3)
          console.log(`Interact target: ${obj.object_id}`);
        }
      }
      break; // one move per tick
    }
  }

  // Toggle debug overlay
  if (input.wasKeyPressed('F1')) debugOverlay = !debugOverlay;

  input.clearFrameState();
}

// ─── Render ───────────────────────────────────────────────────────────────────

function renderPlayer() {
  renderer.clearLayer(LAYER.CHARACTERS);
  renderer.clearLayer(LAYER.ENTITY_SHADOW);

  const screen = camera.worldToScreen(playerTileX, playerTileY);

  // Drop shadow
  renderer.drawRect(LAYER.ENTITY_SHADOW, screen.x + 4, screen.y + 26, 24, 5, '#000000', 0.3);

  // Player: white rectangle placeholder
  renderer.drawRect(LAYER.CHARACTERS, screen.x + 2, screen.y + 2, 28, 28, '#f0f0f0');

  // Facing indicator (small coloured dot)
  const dotColors = { north: '#44aaff', south: '#ff6644', east: '#44ff88', west: '#ffcc22' };
  const dotOffsets = {
    north: { x: 12, y: 2  },
    south: { x: 12, y: 22 },
    east:  { x: 22, y: 12 },
    west:  { x: 2,  y: 12 },
  };
  const dot = dotOffsets[playerFacing];
  renderer.drawRect(LAYER.CHARACTERS,
    screen.x + dot.x, screen.y + dot.y, 8, 8,
    dotColors[playerFacing]);
}

function renderUI() {
  renderer.clearLayer(LAYER.UI_CHROME);
  const ctx = renderer.getLayerContext(LAYER.UI_CHROME);

  // Debug tile coords (always visible, F1 toggles extended info)
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(4, 4, debugOverlay ? 200 : 140, 18);
  ctx.fillStyle = '#ffffff';
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`Tile: ${playerTileX}, ${playerTileY}  [F1]`, 8, 7);

  if (debugOverlay && mapData) {
    const tile = mapData.getTile(playerTileX, playerTileY, mapData.currentFloor);
    const obj  = mapData.getObjectAt(playerTileX, playerTileY, mapData.currentFloor);
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(4, 24, 240, 60);
    ctx.fillStyle = '#ccffcc';
    ctx.fillText(`Tile def: ${tile ? JSON.stringify(tile.tags) : 'none'}`, 8, 27);
    ctx.fillStyle = '#ffcccc';
    ctx.fillText(`passable: ${mapData.isPassable(playerTileX, playerTileY, 0)}`, 8, 41);
    ctx.fillStyle = '#ccccff';
    ctx.fillText(`object: ${obj ? obj.object_id : 'none'}`, 8, 55);
  }

  // Map name bottom-left
  if (mapData) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(4, 463, 200, 14);
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '10px monospace';
    ctx.fillText(mapData.def.display_name, 8, 464);
  }
}

// ─── Bootstrap ────────────────────────────────────────────────────────────────

async function init() {
  mapData     = await loadMap('/data/maps/test_town.json');
  mapRenderer = new MapRenderer(renderer, camera);

  camera.setMapBounds(mapData.width, mapData.height);
  camera.snapTo(playerTileX, playerTileY);

  loop.onTick(() => {
    handleMovement();
  });

  loop.onRender(() => {
    camera.update();
    mapRenderer.render(mapData, playerTileX, playerTileY);
    renderPlayer();
    renderUI();
    renderer.composite();
  });

  loop.start();
  console.log('Phase 2 — Map engine loaded:', mapData.def.display_name,
    `(${mapData.width}×${mapData.height})`);
}

init().catch(err => {
  console.error('Engine init failed:', err);
  document.body.style.color = '#f66';
  document.body.style.fontFamily = 'monospace';
  document.body.style.padding = '20px';
  document.body.textContent = 'Engine error: ' + err.message;
});
</script>
</body>
</html>
